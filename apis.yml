description: >-
  openFDA is the U.S. Food and Drug Administration's public data platform,
  providing Elasticsearch-backed REST APIs serving FDA-administered data on
  drugs, medical devices, foods, animal and veterinary products, and tobacco.
  Twenty-two endpoints under a single api.fda.gov base URL expose adverse
  event reports (FAERS, MAUDE, CAERS), recall enforcement reports, Structured
  Product Labeling, the National Drug Code Directory, Drugs@FDA approvals,
  drug shortages, device classification, 510(k) and PMA submissions, Unique
  Device Identifier records, registration and listing, NSDE drug data, FDA
  substance harmonization, and historical FDA documents. All endpoints share
  a Lucene-style search, sort, count, limit, and skip parameter surface, are
  released under CC0 Public Domain, and operate under a free api.data.gov key
  that lifts daily quotas to 120,000 requests.
